name: iOS TestFlight Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # set temporary keychain as default
          security default-keychain -s $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g | grep -v "$KEYCHAIN_PATH")

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Prebuild & Migrate Flutter iOS Project
        run: flutter build ipa --config-only || flutter build ios --config-only || true
        
      - name: Update Xcode Build Settings and ExportOptions
        run: |
          # Extract Profile Info
          MOBILE_PROVISION_XML=$(security cms -D -i "$RUNNER_TEMP/build_pp.mobileprovision")
          export TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin <<< "$MOBILE_PROVISION_XML")
          export PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$MOBILE_PROVISION_XML")
          
          echo "Extracted Team ID: $TEAM_ID"
          echo "Extracted Profile Name: $PROFILE_NAME"
          
          # Inject to project.pbxproj using python
          python3 -c "
          import re, os
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(path, 'r') as f: content = f.read()
          team_id = os.environ.get('TEAM_ID')
          profile_name = os.environ.get('PROFILE_NAME')
          
          # Inject settings right after the bundle identifier
          target = r'PRODUCT_BUNDLE_IDENTIFIER = com\.audckswl\.firenze;'
          replacement = f'PRODUCT_BUNDLE_IDENTIFIER = com.audckswl.firenze;\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = {chr(34)}{team_id}{chr(34)};\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = {chr(34)}{profile_name}{chr(34)};'
          content = re.sub(target, replacement, content)
          
          # Fix deployment target for ML Kit compatibility
          content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [\d\.]+;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.5;', content)
          
          content = re.sub(r'\"iPhone Developer\"', '\"Apple Distribution\"', content)
          with open(path, 'w') as f: f.write(content)
          
          # Fix Podfile target
          pod_path = 'ios/Podfile'
          if os.path.exists(pod_path):
              with open(pod_path, 'r') as f: pod_content = f.read()
              # Match commented or uncommented platform :ios
              pod_content = re.sub(r'^#?\s*platform\s+:ios,\s*\'[\d\.]+\'', \"platform :ios, '15.5'\", pod_content, flags=re.MULTILINE)
              with open(pod_path, 'w') as f: f.write(pod_content)
          "
          
          # Update ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" ios/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ios/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ios/ExportOptions.plist || true
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.audckswl.firenze string $PROFILE_NAME" ios/ExportOptions.plist

      - name: Build iOS App
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'build/ios/ipa/florence.ipa' 
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_P8_KEY }}
